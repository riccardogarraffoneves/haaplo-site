<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>haAplo x iMei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CONFIG - l'unica cosa da cambiare per collegare l'agente
   Incolla qui sotto l'indirizzo del webhook della chat di n8n.
   Lo prendiamo insieme al prossimo passo.
   ============================================================ */
:root{
  --bg:#2b2b2b;
  --panel:#232323;
  --panel-2:#1d1d1d;
  --line:#3a3a3a;
  --text:#ededed;
  --muted:#8d8d8d;
  --neon:#b6ff3c;
  --neon-dim:rgba(182,255,60,.14);
  --user:#343434;
  --radius:14px;
  --font-d:"Bricolage Grotesque",sans-serif;
  --font-b:"Sora",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::selection{background:var(--neon);color:#1a1a1a}

/* ---------- scrollbars ---------- */
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:9px}
*::-webkit-scrollbar-thumb:hover{background:#4a4a4a}

/* ============================================================
   LOGIN
   ============================================================ */
#login{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(900px 500px at 50% -10%, rgba(182,255,60,.06), transparent 60%),
    var(--bg);
}
.login-card{
  width:min(92vw,380px);
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
}
.brand{
  font-family:var(--font-d);
  font-weight:800;
  letter-spacing:-.02em;
  font-size:30px;
  margin-bottom:4px;
}
.brand .x{color:var(--neon);font-weight:400;padding:0 4px}
.login-sub{color:var(--muted);font-size:13.5px;margin-bottom:32px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
.field input{
  width:100%;background:var(--panel);border:1px solid var(--line);
  color:var(--text);padding:13px 14px;border-radius:11px;font-size:14.5px;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-dim)}
.remember{display:flex;align-items:center;gap:9px;margin:18px 0 24px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}
.remember input{accent-color:var(--neon);width:15px;height:15px;cursor:pointer}
.btn-neon{
  width:100%;background:var(--neon);color:#181818;font-weight:600;
  padding:13px;border-radius:11px;font-size:14.5px;letter-spacing:.01em;
  transition:transform .12s,filter .2s;
}
.btn-neon:hover{filter:brightness(1.08)}
.btn-neon:active{transform:translateY(1px)}
.login-err{color:#ff6b6b;font-size:13px;margin-top:14px;min-height:18px;text-align:center;opacity:0;transition:opacity .2s}
.login-err.show{opacity:1}

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app{display:none;height:100%;grid-template-columns:282px 1fr}
#app.on{display:grid}

/* ---------- sidebar ---------- */
.side{
  background:var(--panel-2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  height:100%;min-height:0;overflow:hidden;
}
.side-top{padding:20px 18px 14px}
.side-brand{font-family:var(--font-d);font-weight:800;font-size:18px;letter-spacing:-.02em}
.side-brand .x{color:var(--neon);font-weight:400;padding:0 3px}
.side-actions{padding:0 12px;display:flex;flex-direction:column;gap:8px}
.s-btn{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:11px 12px;border-radius:10px;font-size:13.5px;color:var(--text);
  border:1px solid transparent;transition:background .15s,border-color .15s;
}
.s-btn:hover{background:var(--panel)}
.s-btn.primary{background:var(--neon-dim);border-color:rgba(182,255,60,.3);color:var(--neon)}
.s-btn.primary:hover{background:rgba(182,255,60,.2)}
.s-btn svg{width:16px;height:16px;flex:none}
#searchBox{display:none;padding:2px 12px 0}
#searchBox.on{display:block}
#searchInput{
  width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  padding:9px 11px;border-radius:9px;font-size:13px;
}
#searchInput:focus{outline:none;border-color:var(--neon)}
.chats{flex:1;min-height:0;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:3px}
.chats-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:6px 10px 8px}
.chat-item{
  padding:10px 11px;border-radius:9px;font-size:13.5px;color:#cfcfcf;
  cursor:pointer;border:1px solid transparent;transition:background .12s;
  display:flex;align-items:center;gap:7px;
}
.chat-item:hover{background:var(--panel)}
.chat-item.active{background:var(--panel);border-color:var(--line);color:var(--text)}
.ci-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pin-ico{flex:none;color:var(--muted);display:flex;align-items:center}
.pin-ico svg{width:13px;height:13px}
.kebab{
  flex:none;width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  opacity:0;transition:opacity .12s,background .12s,color .12s;
}
.kebab svg{width:16px;height:16px}
.chat-item:hover .kebab,.chat-item.active .kebab{opacity:1}
.kebab:hover{background:var(--panel-2);color:var(--text)}
.rename-input{
  flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--neon);
  color:var(--text);border-radius:7px;padding:6px 8px;font-size:13.5px;
}
.rename-input:focus{outline:none}
.chat-empty{color:var(--muted);font-size:12.5px;padding:8px 11px;line-height:1.5}
.chat-menu{
  position:fixed;display:none;z-index:60;min-width:208px;
  background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:6px;box-shadow:0 14px 34px rgba(0,0,0,.5);
}
.cm-item{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:9px 11px;border-radius:8px;font-size:13.5px;color:var(--text);
  transition:background .12s,color .12s;
}
.cm-item:hover{background:var(--user)}
.cm-item .ico{flex:none;width:18px;text-align:center;font-size:14px}
.cm-item svg{flex:none;width:17px;height:17px}
.cm-item.danger{color:#ff7b7b}
.cm-item.danger:hover{background:#cf4b44;color:#fff}

/* ---------- profile ---------- */
.profile-wrap{border-top:1px solid var(--line);padding:12px;position:relative}
.profile{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;
  cursor:pointer;transition:background .15s;
}
.profile:hover{background:var(--panel)}
.avatar{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--neon),#7bc62a);color:#1a1a1a;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;
  font-family:var(--font-d);
}
.profile-info{line-height:1.3;overflow:hidden}
.profile-name{font-size:13.5px;font-weight:500}
.profile-id{font-size:11px;color:var(--muted)}
.logout-pop{
  position:absolute;left:12px;right:12px;bottom:64px;
  background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:6px;display:none;box-shadow:0 12px 30px rgba(0,0,0,.45);
}
.logout-pop.on{display:block;animation:rise .2s ease both}
.logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:8px;font-size:13.5px;color:#ff7676}
.logout-btn:hover{background:rgba(255,118,118,.1)}

/* ============================================================
   MAIN / CHAT
   ============================================================ */
.main{display:flex;flex-direction:column;height:100%;position:relative;min-width:0;min-height:0}
.main::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(700px 400px at 80% -5%,rgba(182,255,60,.05),transparent 55%);
}
.feed{flex:1;min-height:0;overflow-y:auto;padding:30px 0 16px;position:relative;z-index:1}
.feed-inner{max-width:760px;margin:0 auto;padding:0 26px;display:flex;flex-direction:column;gap:22px}

/* greeting (empty state) */
.greet{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:24px;z-index:1;
}
.greet h1{
  font-family:var(--font-d);font-weight:800;font-size:clamp(26px,4vw,40px);
  letter-spacing:-.025em;line-height:1.1;
}
.greet h1 .accent{color:var(--neon)}
.greet p{color:var(--muted);margin-top:12px;font-size:15px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--neon);margin-bottom:22px;box-shadow:0 0 18px var(--neon);animation:pulse 2.4s ease-in-out infinite}

/* messages */
.msg{display:flex;flex-direction:column;animation:fade .35s ease both}
.msg .who{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em}
.bubble{padding:13px 16px;border-radius:14px;line-height:1.6;font-size:14.5px;max-width:90%;word-wrap:break-word}
.msg.user{align-items:flex-end}
.msg.user .bubble{background:var(--user);border-bottom-right-radius:5px}
.msg.bot .bubble{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
.bubble img{max-width:100%;border-radius:10px;margin:8px 0 2px;display:block;border:1px solid var(--line)}
.msg.user .bubble img{max-width:240px}
.bubble video{max-width:100%;border-radius:10px;margin:8px 0 2px;display:block;border:1px solid var(--line)}
.bubble a{color:var(--neon);text-decoration:underline;text-underline-offset:2px}
.bubble strong{font-weight:600}

/* loader */
.loader{display:flex;align-items:center;gap:11px;color:var(--muted);font-size:13.5px}
.loader .spin{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;flex:none}

/* input bar */
.composer{padding:14px 0 22px;position:relative;z-index:1}
.composer-inner{max-width:760px;margin:0 auto;padding:0 26px}
.input-row{
  display:flex;align-items:flex-end;gap:10px;background:var(--panel);
  border:1px solid var(--line);border-radius:16px;padding:9px 9px 9px 16px;
  transition:border-color .2s,box-shadow .2s;
}
.input-row:focus-within{border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-dim)}
#msgInput{
  flex:1;background:none;border:none;color:var(--text);font-size:14.5px;
  resize:none;max-height:160px;line-height:1.5;padding:6px 0;
}
#msgInput:focus{outline:none}
#msgInput::placeholder{color:var(--muted)}
.send{
  width:40px;height:40px;border-radius:11px;background:var(--neon);color:#181818;
  display:flex;align-items:center;justify-content:center;flex:none;transition:filter .15s,transform .1s,opacity .15s;
}
.send:hover{filter:brightness(1.08)}
.send:active{transform:scale(.94)}
.send:disabled{opacity:.4;cursor:not-allowed}
.send svg{width:19px;height:19px}
.mic{
  width:40px;height:40px;border-radius:11px;flex:none;
  background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s,transform .1s;
}
.mic:hover{color:var(--neon);border-color:var(--neon)}
.mic:active{transform:scale(.94)}
.mic svg{width:18px;height:18px}
.mic .micspin{display:none;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite}
.mic.rec{background:#ff5b5b;border-color:#ff5b5b;color:#fff;animation:micPulse 1.3s ease-in-out infinite}
.mic.rec:hover{color:#fff}
.mic.load{pointer-events:none}
.mic.load svg{display:none}
.mic.load .micspin{display:block}
.attach{
  width:40px;height:40px;border-radius:11px;flex:none;
  background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s,transform .1s;
}
.attach:hover{color:var(--neon);border-color:var(--neon)}
.attach:active{transform:scale(.94)}
.attach svg{width:19px;height:19px}
.attach.busy{pointer-events:none;opacity:.55}
.attach-preview{padding-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.att-chip{position:relative;width:60px;height:60px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2)}
.att-chip img{width:100%;height:100%;object-fit:cover;display:block}
.att-x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;border:none;cursor:pointer}
.att-x:hover{background:rgba(0,0,0,.85)}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,91,91,.45)}50%{box-shadow:0 0 0 6px rgba(255,91,91,0)}}
/* barra di registrazione vocale */
.rec-bar{
  display:none;align-items:center;gap:12px;background:var(--panel);
  border:1px solid var(--line);border-radius:16px;padding:8px 10px;
}
.rec-bar.on{display:flex}
.rec-x,.rec-ok{
  width:44px;height:44px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,filter .15s,background .15s,border-color .15s,color .15s;
}
.rec-x{background:transparent;border:1.5px solid var(--line);color:var(--muted)}
.rec-x:hover{border-color:var(--text);color:var(--text)}
.rec-ok{background:var(--neon);color:#181818}
.rec-ok:hover{filter:brightness(1.08)}
.rec-x:active,.rec-ok:active{transform:scale(.92)}
.rec-x svg,.rec-ok svg{width:20px;height:20px}
.rec-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:12px;min-width:0;overflow:hidden}
.rec-label{color:var(--muted);font-size:14.5px;white-space:nowrap}
.wave{display:flex;align-items:center;gap:3px;height:26px}
.wave .bar{width:3px;height:100%;border-radius:3px;background:var(--neon);transform:scaleY(.12);transform-origin:center;transition:transform .07s linear}
.rec-spin{display:none;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;flex:none}
.rec-bar.working .wave{display:none}
.rec-bar.working .rec-x,.rec-bar.working .rec-ok{display:none}
.rec-bar.working .rec-spin{display:block}
.hint{text-align:center;color:var(--muted);font-size:11px;margin-top:9px}

/* ---------- animations ---------- */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}

@media(max-width:720px){
  #app.on{grid-template-columns:1fr}
  .side{position:fixed;z-index:20;width:282px;transform:translateX(-100%);transition:transform .25s}
  .side.open{transform:none}
}
   @keyframes loaderPulse{0%,100%{opacity:.4}50%{opacity:1}}
#loadTxt{animation:loaderPulse 1.6s ease-in-out infinite}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brand">haAplo<span class="x">x</span>iMei</div>
    <div class="login-sub">Accedi per entrare nello studio grafico.</div>
    <div class="field">
      <label>ID utente</label>
      <input id="loginId" type="text" autocomplete="username" placeholder="Il tuo ID" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPw" type="password" autocomplete="current-password" placeholder="La tua password" />
    </div>
    <label class="remember"><input id="remember" type="checkbox" /> Mantieni l'accesso</label>
    <button class="btn-neon" id="loginBtn">Entra</button>
    <div class="login-err" id="loginErr">Credenziali non valide.</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <!-- sidebar -->
  <aside class="side" id="side">
    <div class="side-top">
      <div class="side-brand">haAplo<span class="x">x</span>iMei</div>
    </div>
    <div class="side-actions">
      <button class="s-btn primary" id="newChat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Nuova chat
      </button>
      <button class="s-btn" id="searchToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        Cerca una chat
      </button>
    </div>
    <div id="searchBox"><input id="searchInput" placeholder="Cerca per nome prodotto..." /></div>
    <div class="chats" id="chatList">
      <div class="chats-label">Le tue chat</div>
    </div>
    <div class="profile-wrap">
      <div class="logout-pop" id="logoutPop">
        <button class="logout-btn" id="logoutBtn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Esci
        </button>
      </div>
      <div class="profile" id="profile">
        <div class="avatar" id="avatar">iD</div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">iMei DIV</div>
          <div class="profile-id">id: imei-div</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="feed" id="feed">
      <div class="greet" id="greet">
        <span class="dot"></span>
        <h1>Ciao <span class="accent" id="greetName">iMei DIV</span>!<br>Che idee hai oggi?</h1>
      </div>
      <div class="feed-inner" id="feedInner"></div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <div class="attach-preview" id="attachPreview" hidden>
          <div class="att-chip">
            <img id="attachThumb" alt="anteprima">
            <button class="att-x" id="attachRemove" title="Rimuovi" aria-label="Rimuovi">&times;</button>
          </div>
        </div>
        <div class="input-row">
          <button class="attach" id="attachBtn" title="Allega un'immagine" aria-label="Allega un'immagine">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" hidden>
          <textarea id="msgInput" rows="1" placeholder="Di cos'hai bisogno?"></textarea>
          <button class="mic" id="micBtn" title="Detta a voce" aria-label="Detta a voce">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3"/></svg>
            <span class="micspin"></span>
          </button>
          <button class="send" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="rec-bar" id="recBar">
          <button class="rec-x" id="recCancel" title="Annulla" aria-label="Annulla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
          <div class="rec-mid">
            <span class="rec-spin"></span>
            <div class="wave" id="wave"></div>
            <span class="rec-label" id="recLabel">Ascolto in corso</span>
          </div>
          <button class="rec-ok" id="recDone" title="Fine" aria-label="Fine">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </button>
        </div>

function renderChatList(){
  const q = ($("#searchInput").value || "").toLowerCase();
  const list = $("#chatList");
  list.innerHTML = '<div class="chats-label">Le tue chat</div>';
  let filtered = chats.filter(c => !q || c.title.toLowerCase().includes(q)
      || c.messages.some(m => m.text.toLowerCase().includes(q)));
  filtered = filtered.slice().sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  if(!filtered.length){

    e.className = "chat-empty";

  filtered.forEach(c => {
    const el = document.createElement("div");

    if(c.id === renamingId){
      const inp = document.createElement("input");
      inp.className = "rename-input";
      inp.value = c.title;
      el.appendChild(inp);
      list.appendChild(el);
      const commit = (save) => {
        if(renamingId !== c.id) return;
        renamingId = null;
        if(save){ const v = inp.value.trim(); if(v) c.title = v; saveChats(); }
        renderChatList();
      };
      inp.addEventListener("keydown", ev => {
        if(ev.key === "Enter"){ ev.preventDefault(); commit(true); }
        else if(ev.key === "Escape"){ ev.preventDefault(); commit(false); }
      });
      inp.addEventListener("blur", () => commit(true));
      setTimeout(() => { inp.focus(); inp.select(); }, 0);

    if(c.pinned){

/* nome automatico semplice dalla prima frase (versione intelligente: aggiornamento futuro) */

/* ============================================================
   RENDER MESSAGGI
   ============================================================ */
function esc(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function isVideo(url){ return /\/video\//.test(url) || /\.mp4($|\?)/i.test(url); }

function mdToHtml(raw){
  let s = esc(raw);
  // immagini  ![alt](url)
  s = s.replace(/!\[[^\]]*\]\(([^)]+)\)/g, (m,url) =>
      isVideo(url) ? `<video controls src="${url}"></video>` : `<img src="${url}" alt="" />`);
  // link [testo](url) -> video o link
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,txt,url) =>
      isVideo(url) ? `<video controls src="${url}"></video>` : `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`);
  // url nudi
  s = s.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g, (m,pre,url) =>
      isVideo(url) ? `${pre}<video controls src="${url}"></video>` : `${pre}<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\n/g, "<br>");
  return s;
}

function renderFeed(){
  const c = activeChat();
  const inner = $("#feedInner");
  inner.innerHTML = "";
  if(!c || !c.messages.length){
    $("#greet").style.display = "flex";

}
function bubble(m){
  const role = m.role, text = m.text, img = m.img;
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role==="user" ? "user" : "bot");
  const who = document.createElement("div");
  who.className = "who";
  who.textContent = role==="user" ? "Tu" : "Agente";
  const b = document.createElement("div");
  b.className = "bubble";
  if(img){

    im.src = img; im.alt = "immagine";
    b.appendChild(im);

  if(text){
    const t = document.createElement("div");
    if(role==="user") t.textContent = text;
    else t.innerHTML = mdToHtml(text);
    if(img) t.style.marginTop = "4px";
    b.appendChild(t);
  }
  wrap.appendChild(who); wrap.appendChild(b);
  return wrap;
}
function scrollDown(){ const f=$("#feed"); f.scrollTop = f.scrollHeight; }

/* loader con frasi che ruotano (versione semplice; i passi reali = aggiornamento futuro) */
const LOAD_MSGS = ["Sto lavorando..."];
function addLoader(){
  const wrap = document.createElement("div");
  wrap.className = "msg bot"; wrap.id = "loaderMsg";
  wrap.innerHTML = `<div class="who">Agente</div><div class="bubble"><div class="loader"><span class="spin"></span><span id="loadTxt">${LOAD_MSGS[0]}</span></div></div>`;
  $("#feedInner").appendChild(wrap); scrollDown();
  let i=0;
  wrap._t = setInterval(()=>{ i=(i+1)%LOAD_MSGS.length; const t=$("#loadTxt"); if(t) t.textContent=LOAD_MSGS[i]; }, 2200);
}
function removeLoader(){ const l=$("#loaderMsg"); if(l){ clearInterval(l._t); l.remove(); } }

/* ============================================================
   INVIO ALL'AGENTE
   ============================================================ */
async function sendToAgent(text, sessionId){
  if(!AGENT_WEBHOOK_URL){
    return "Per ora non sono collegato al motore. Incolla l'indirizzo del webhook nel file (AGENT_WEBHOOK_URL) e potro rispondere davvero.";
  }
  const res = await fetch(AGENT_WEBHOOK_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"sendMessage", sessionId, chatInput:text })
  });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json().catch(()=>null);
  if(!data) return "(risposta vuota)";
  return data.output ?? data.text ?? data.message ?? (typeof data==="string" ? data : JSON.stringify(data));
}

let busy = false;
let pendingImage = null; // immagine allegata in attesa: { file, dataURL }
async function send(){
  const ta = $("#msgInput");
  const text = ta.value.trim();
  if((!text && !pendingImage) || busy) return;
  const c = activeChat(); if(!c) return;

  busy = true; $("#sendBtn").disabled = true;

  // messaggio dell'utente, con eventuale immagine allegata
  const userMsg = { role:"user", ts:Date.now() };
  if(text) userMsg.text = text;
  let toUpload = null;
  if(pendingImage){ userMsg.img = pendingImage.dataURL; toUpload = pendingImage.file; pendingImage = null; hideAttachPreview(); }
  c.messages.push(userMsg);
  if(c.title === "Nuova chat") c.title = text ? autoTitle(text) : "Immagine caricata";
  ta.value=""; ta.style.height="auto";
  saveChats(); renderChatList(); renderFeed();

  // se c'e' un'immagine, caricala al server (diventa "l'ultima immagine")
  if(toUpload) await uploadToServer(toUpload, userMsg);

  // senza testo non chiamo l'agente: l'immagine e' solo stata caricata
  if(!text){ busy = false; $("#sendBtn").disabled = false; ta.focus(); return; }

  addLoader();
  try{
    const reply = await sendToAgent(text, c.sessionId);
    removeLoader();
    c.messages.push({ role:"bot", text:reply, ts:Date.now() });
  }catch(err){
    removeLoader();
    c.messages.push({ role:"bot", text:"Qualcosa e andato storto: " + err.message + ". Riprova." });
  }
  saveChats(); renderFeed();
  busy = false; $("#sendBtn").disabled = false; ta.focus();
}
$("#sendBtn").addEventListener("click", send);
$("#msgInput").addEventListener("keydown", e => {
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});
$("#msgInput").addEventListener("input", function(){
  this.style.height="auto"; this.style.height=Math.min(this.scrollHeight,160)+"px";
});

/* ============================================================
   CARICAMENTO IMMAGINE (allega un file)
   ============================================================ */
const attachBtn     = document.getElementById("attachBtn");
const fileInput     = document.getElementById("fileInput");
const attachPreview = document.getElementById("attachPreview");
const attachThumb   = document.getElementById("attachThumb");
const attachRemove  = document.getElementById("attachRemove");

function fileToDataURL(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("lettura del file fallita"));
    r.readAsDataURL(file);
  });
}
function showAttachPreview(dataURL){ if(attachThumb) attachThumb.src = dataURL; if(attachPreview) attachPreview.hidden = false; }
function hideAttachPreview(){ if(attachPreview) attachPreview.hidden = true; if(attachThumb) attachThumb.removeAttribute("src"); }

if(attachBtn && fileInput){
  attachBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", async () => {
    const file = fileInput.files && fileInput.files[0];
    fileInput.value = ""; // cosi puoi ricaricare anche lo stesso file
    if(!file) return;
    if(!file.type.startsWith("image/")){ alert("Carica un'immagine."); return; }
    const dataURL = await fileToDataURL(file);
    pendingImage = { file, dataURL };  // resta in attesa, NON viene mandata subito
    showAttachPreview(dataURL);         // piccola anteprima nel composer, come su Claude
    $("#msgInput").focus();
  });
}
if(attachRemove){
  attachRemove.addEventListener("click", () => { pendingImage = null; hideAttachPreview(); });
}

// invio al server: l'immagine viene salvata come una generata e diventa "l'ultima immagine"
async function uploadToServer(file, msg){
  if(attachBtn) attachBtn.classList.add("busy");
  try{
    const dataURL = await fileToDataURL(file);
    const base64 = String(dataURL).split(",")[1] || "";
    if(!UPLOAD_WEBHOOK_URL) throw new Error("collegamento di caricamento non ancora attivo");
    const res = await fetch(UPLOAD_WEBHOOK_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ image: base64, mime: file.type, filename: file.name })
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json().catch(()=>null);
    const id = data && (data.id ?? data.imageId ?? data.image_id);
    if(id){ msg.img = IMG_BASE_URL + id; } // ora si vede dal server e resta dopo il refresh
    saveChats(); renderFeed();
  }catch(err){
    console.warn("caricamento immagine:", err.message);
    saveChats(); // l'anteprima resta in questa sessione; saveChats salva solo un riferimento leggero
  }finally{
    if(attachBtn) attachBtn.classList.remove("busy");
  }
}

<!-- ============================================================
     DETTATURA A VOCE. Tutto sul dispositivo, niente esce.
     La voce non lascia il computer. All'agente arriva solo il testo,
     come quando scrivi. La prima volta scarica il modello (il programma),
     non manda fuori nessun dato.
     ============================================================ -->
<script type="module">
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js";

// non cercare modelli sul disco, li prende dal hub pubblico una volta sola
env.allowLocalModels = false;

// modello. small = piu' preciso in italiano e sui nomi prodotto (scelto). Piu' leggero ma meno preciso: "Xenova/whisper-base" o "Xenova/whisper-tiny".
const VOICE_MODEL = "Xenova/whisper-small";

const micBtn   = document.getElementById("micBtn");
const hintEl   = document.getElementById("hint");
const inputEl  = document.getElementById("msgInput");
const inputRow = document.querySelector(".input-row");
const recBar   = document.getElementById("recBar");
const recCancel= document.getElementById("recCancel");
const recDone  = document.getElementById("recDone");
const recLabel = document.getElementById("recLabel");
const waveEl   = document.getElementById("wave");

if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !micBtn){
  if(micBtn) micBtn.style.display = "none";
} else {
  const DEFAULT_HINT = hintEl ? hintEl.textContent : "";
  const WAVE_BARS = 24;
  for(let i=0;i<WAVE_BARS;i++){ const b=document.createElement("span"); b.className="bar"; waveEl.appendChild(b); }
  const bars = waveEl.querySelectorAll(".bar");

  let transcriber = null, loadingPromise = null;
  let recorder = null, chunks = [], stream = null;
  let waveCtx = null, analyser = null, srcNode = null, rafId = null;
  let state = "idle"; // idle | rec | work

  const setHint = t => { if(hintEl) hintEl.textContent = t; };
  const resetHint = () => { if(hintEl) hintEl.textContent = DEFAULT_HINT; };
  const showRec  = () => { inputRow.style.display = "none"; recBar.classList.add("on"); };
  const showInput= () => { recBar.classList.remove("on","working"); recLabel.textContent = "Ascolto in corso"; inputRow.style.display = ""; };

  function loadModel(){
    if(transcriber) return Promise.resolve(transcriber);
    if(loadingPromise) return loadingPromise;
    loadingPromise = pipeline("automatic-speech-recognition", VOICE_MODEL)
      .then(p => { transcriber = p; return p; })
      .catch(err => { loadingPromise = null; throw err; });
    return loadingPromise;
  }

  // strisce della voce, si muovono col volume reale
  function startWave(){
    const AC = window.AudioContext || window.webkitAudioContext;
    waveCtx = new AC();
    if(waveCtx.state === "suspended") waveCtx.resume();
    srcNode = waveCtx.createMediaStreamSource(stream);
    analyser = waveCtx.createAnalyser();
    analyser.fftSize = 64;
    srcNode.connect(analyser);
    const bins = analyser.frequencyBinCount;
    const data = new Uint8Array(bins);
    const N = bars.length;
    const tick = () => {
      let level = 0;
      if(analyser){
        analyser.getByteFrequencyData(data);
        let sum = 0; for(let k=0;k<bins;k++) sum += data[k];
        level = (sum / bins) / 255;
      }
      const t = performance.now() / 1000;
      const amp = 0.18 + level * 1.6;
      for(let i=0;i<N;i++){
        const w = (Math.sin(t*7 + i*0.55) + 1) / 2;
        let h = 0.14 + w * amp;
        if(h > 1) h = 1;
        bars[i].style.transform = "scaleY(" + h.toFixed(3) + ")";
      }
      rafId = requestAnimationFrame(tick);
    };
    tick();
  }
  function stopWave(){
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;
    try{ if(srcNode) srcNode.disconnect(); }catch(e){}
    try{ if(waveCtx) waveCtx.close(); }catch(e){}
    waveCtx = analyser = srcNode = null;
    bars.forEach(b => { b.style.transform = "scaleY(0.12)"; });
  }

  async function startRec(){
    stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    chunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => { if(e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.start();
    loadModel().catch(()=>{}); // intanto scarica il modello
    state = "rec";
    showRec();
    startWave();
  }

  function stopRec(){
    return new Promise(resolve => {
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
        if(stream) stream.getTracks().forEach(t => t.stop());
        resolve(blob);
      };
      recorder.stop();
    });
  }

  function teardown(){
    stopWave();
    try{ if(recorder && recorder.state !== "inactive") recorder.stop(); }catch(e){}
    if(stream) stream.getTracks().forEach(t => t.stop());
    state = "idle";
  }

  // dall'audio registrato a campioni mono a 16000, come vuole il modello
  async function blobToSamples(blob){
    const buf = await blob.arrayBuffer();
    const AC = window.AudioContext || window.webkitAudioContext;
    const ctx = new AC();
    const decoded = await ctx.decodeAudioData(buf);
    let data;
    const n = decoded.numberOfChannels;
    if(n > 1){
      data = new Float32Array(decoded.length);
      for(let ch=0; ch<n; ch++){
        const cd = decoded.getChannelData(ch);
        for(let i=0;i<cd.length;i++) data[i] += cd[i]/n;
      }
    } else {
      data = decoded.getChannelData(0).slice();
    }
    const rate = decoded.sampleRate;
    ctx.close();
    if(rate === 16000) return data;
    const off = new OfflineAudioContext(1, Math.ceil(data.length*16000/rate), 16000);
    const b = off.createBuffer(1, data.length, rate);
    b.copyToChannel(data, 0);
    const src = off.createBufferSource();
    src.buffer = b; src.connect(off.destination); src.start(0);
    const rendered = await off.startRendering();
    return rendered.getChannelData(0);
  }

  async function transcribe(blob){
    const model = await loadModel();
    const samples = await blobToSamples(blob);
    const out = await model(samples, { language:"italian", task:"transcribe", chunk_length_s:30, stride_length_s:5 });
    return ((out && out.text) || "").trim();
  }

  function putText(text){
    if(!text) return;
    const cur = inputEl.value.trim();
    inputEl.value = cur ? (cur + " " + text) : text;
    inputEl.dispatchEvent(new Event("input", { bubbles:true })); // ridimensiona la barra
    inputEl.focus();
  }

  // microfono: avvia solo la registrazione
  micBtn.addEventListener("click", async () => {
    if(state !== "idle") return;
    try{
      await startRec();
    }catch(err){
      teardown(); showInput();
      setHint("Non riesco ad accedere al microfono. Controlla il permesso.");
      setTimeout(resetHint, 3500);
    }
  });

  // check: ho finito, trascrivi
  recDone.addEventListener("click", async () => {
    if(state !== "rec") return;
    state = "work";
    stopWave();
    recBar.classList.add("working");
    recLabel.textContent = "Trascrivo...";
    try{
      const blob = await stopRec();
      const text = await transcribe(blob);
      showInput();
      putText(text);
      if(!text){ setHint("Non ho capito nulla. Riprova."); setTimeout(resetHint, 3000); }
    }catch(err){
      showInput();
      setHint("Errore nella trascrizione. Riprova."); setTimeout(resetHint, 3500);
    }finally{
      state = "idle";
    }
  });

  // x: annulla, nessuna trascrizione
  recCancel.addEventListener("click", async () => {
    if(state !== "rec") return;
    state = "work";
    stopWave();
    try{ await stopRec(); }catch(e){}
    showInput();
    state = "idle";
  });
}
</script>
</body>
</html>
